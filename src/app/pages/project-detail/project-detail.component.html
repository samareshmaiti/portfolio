<section class="section" *ngIf="project; else notFound">
  <div class="container">
    <h1 class="section-title">{{ project.name }}</h1>
    <p class="section-subtitle">{{ project.tagline }}</p>

    <div class="project-detail">
      <div class="project-overview">
        <h2>Overview</h2>
        <p>{{ project.description }}</p>
      </div>

      <div class="project-details">
        <div class="detail-item">
          <h3>Role</h3>
          <p>{{ project.role }}</p>
        </div>
        <div class="detail-item">
          <h3>Technologies</h3>
          <div class="tech-stack">
            <span class="chip" *ngFor="let tech of project.techStack">{{ tech }}</span>
          </div>
        </div>
        <div class="detail-item" *ngIf="project.githubUrl && !project.githubUrl.startsWith('[PLACEHOLDER')">
          <h3>Source Code</h3>
          <a [href]="project.githubUrl" target="_blank" rel="noopener" class="btn btn-outline">GitHub →</a>
        </div>
        <div class="detail-item" *ngIf="project.liveUrl && !project.liveUrl.startsWith('[PLACEHOLDER')">
          <h3>Live Demo</h3>
          <a [href]="project.liveUrl" target="_blank" rel="noopener" class="btn btn-outline">Visit →</a>
        </div>
      </div>

      <div class="project-highlights" *ngIf="project.highlights && project.highlights.length > 0">
        <h2>Key Features</h2>
        <ul>
          <li *ngFor="let highlight of project.highlights">{{ highlight }}</li>
        </ul>
      </div>

      <div class="project-actions">
        <a [routerLink]="['/projects']" class="btn btn-outline">Back to Projects</a>
      </div>
    </div>
  </div>
</section>

<ng-template #notFound>
  <section class="section">
    <div class="container">
      <p>Project not found.</p>
      <a [routerLink]="['/projects']" class="btn btn-outline">Back to Projects</a>
    </div>
  </div>
</ng-template>
